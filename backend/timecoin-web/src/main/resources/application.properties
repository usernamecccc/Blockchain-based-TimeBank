# \u5E94\u7528\u670D\u52A1 WEB \u8BBF\u95EE\u7AEF\u53E3
server.port=8080
# 使用下方 MySQL 配置时：请注释掉下一行（否则会加载 application-dev.properties，仍用 H2）
#spring.profiles.active=dev

#\u9A71\u52A8\u7C7B\u540D\u79F0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#\u6570\u636E\u5E93\u8FDE\u63A5\u7684url（createDatabaseIfNotExist \u5728\u5E93\u4E0D\u5B58\u5728\u65F6\u81EA\u52A8\u5EFA\u5E93\uFF1B\u8868\u7531\u4E0B\u65B9 schema-mysql.sql \u521D\u59CB\u5316\uFF09
spring.datasource.url=jdbc:mysql://localhost:3306/timecoin?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# \u4EC5\u5728\u672A\u4F7F\u7528 dev\uFF08H2\uFF09\u65F6\u751F\u6548\uFF1A\u542F\u52A8\u65F6\u81EA\u52A8\u6267\u884C MySQL \u5EFA\u8868\uFF08\u5E42\u7B49\uFF0C\u4E0D\u4F1A\u6BCF\u6B21\u6E05\u7A7A\u6570\u636E\uFF09
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
#\u8FDE\u63A5\u6570\u636E\u5E93\u7684\u7528\u6237\u540D
spring.datasource.username=root
#\u8FDE\u63A5\u6570\u636E\u5E93\u7684\u5BC6\u7801
spring.datasource.password=123456

#\u914D\u7F6Emybatis\u7684\u65E5\u5FD7, \u6307\u5B9A\u8F93\u51FA\u5230\u63A7\u5236\u53F0
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

#\u5F00\u542Fmybatis\u7684\u9A7C\u5CF0\u547D\u540D\u81EA\u52A8\u6620\u5C04\u5F00\u5173 a_column ------> aCloumn
mybatis.configuration.map-underscore-to-camel-case=true

#\u914D\u7F6E\u5355\u4E2A\u6587\u4EF6\u6700\u5927\u4E0A\u4F20\u5927\u5C0F
spring.servlet.multipart.max-file-size=10MB

# --- TimeCoin \u94FE\u4E0A\uFF08Web3j + Hardhat \u672C\u5730 JSON-RPC\uFF09---
# \u672A\u8BBE spring.profiles.active=dev \u65F6\u53EA\u52A0\u8F7D\u672C\u6587\u4EF6\uFF1A\u82E5 blockchain.enabled=true \u5FC5\u987B\u540C\u65F6\u914D\u7F6E private-key\uFF08\u4E0E\u90E8\u7F72\u8D26\u6237\u4E00\u81F4\uFF09\u3002
# \u542F\u7528\u524D\u8BF7\u5728 TimeCoinSystem \u6267\u884C npx hardhat node \u4E0E npx hardhat deploy --network localhost\uFF1B\u91CD\u542F\u8282\u70B9\u540E\u987B\u66F4\u65B0 contract-address\u3002
# \u7BA1\u7406\u5458\u63A5\u53E3\uFF1A/administrator/chain/status|balance|mint|transfer\uFF08\u9700\u767B\u5F55\u4E14 role=3\uFF09
# \u4EC5\u672C\u5730\u5F00\u53D1\uFF1AHardhat \u8D26\u6237#0\uFF1B\u751F\u4EA7\u73AF\u5883\u8BF7\u5173\u95ED\u94FE\u6216\u7528\u73AF\u5883\u53D8\u91CF\u6CE8\u5165\u5BC6\u94A5\uFF0C\u52FF\u63D0\u4EA4\u771F\u5BC6\u94A5\u5230\u4ED3\u5E93\u3002
# \u9ED8\u8BA4\u5173\u95ED\u94FE\uFF1A\u672C\u5730\u8C03\u8BD5\u65F6\u6539\u4E3A true \u5373\u53EF\uFF08\u5DF2\u9884\u586B\u79C1\u94A5\u4E0E\u5E38\u89C1 localhost \u5408\u7EA6\u5730\u5740\uFF09\u3002
blockchain.enabled=true
blockchain.rpc-url=http://127.0.0.1:8545/
blockchain.contract-address=0x5FbDB2315678afecb367f032d93F642f64180aa3
blockchain.private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
