# \u5E94\u7528\u670D\u52A1 WEB \u8BBF\u95EE\u7AEF\u53E3
server.port=8080
# 使用下方 MySQL 配置时：请注释掉下一行（否则会加载 application-dev.properties，仍用 H2）
#spring.profiles.active=dev

#\u9A71\u52A8\u7C7B\u540D\u79F0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#\u6570\u636E\u5E93\u8FDE\u63A5\u7684url（createDatabaseIfNotExist \u5728\u5E93\u4E0D\u5B58\u5728\u65F6\u81EA\u52A8\u5EFA\u5E93\uFF1B\u8868\u7531\u4E0B\u65B9 schema-mysql.sql \u521D\u59CB\u5316\uFF09
spring.datasource.url=jdbc:mysql://localhost:3306/timecoin?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# \u4EC5\u5728\u672A\u4F7F\u7528 dev\uFF08H2\uFF09\u65F6\u751F\u6548\uFF1A\u542F\u52A8\u65F6\u81EA\u52A8\u6267\u884C MySQL \u5EFA\u8868\uFF08\u5E42\u7B49\uFF0C\u4E0D\u4F1A\u6BCF\u6B21\u6E05\u7A7A\u6570\u636E\uFF09
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
#\u8FDE\u63A5\u6570\u636E\u5E93\u7684\u7528\u6237\u540D
spring.datasource.username=root
#\u8FDE\u63A5\u6570\u636E\u5E93\u7684\u5BC6\u7801
spring.datasource.password=111111

#\u914D\u7F6Emybatis\u7684\u65E5\u5FD7, \u6307\u5B9A\u8F93\u51FA\u5230\u63A7\u5236\u53F0
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

#\u5F00\u542Fmybatis\u7684\u9A7C\u5CF0\u547D\u540D\u81EA\u52A8\u6620\u5C04\u5F00\u5173 a_column ------> aCloumn
mybatis.configuration.map-underscore-to-camel-case=true

#\u914D\u7F6E\u5355\u4E2A\u6587\u4EF6\u6700\u5927\u4E0A\u4F20\u5927\u5C0F
spring.servlet.multipart.max-file-size=10MB
