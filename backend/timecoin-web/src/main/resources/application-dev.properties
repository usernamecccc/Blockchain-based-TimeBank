# 本地无 MySQL 时使用：spring-boot.run.profiles=dev 或 --spring.profiles.active=dev
server.port=8080

# 使用文件库（./data/timecoin），重启后账号数据保留；删除 backend/timecoin-web/data 目录可清空库重来
spring.datasource.url=jdbc:h2:file:./data/timecoin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.max-file-size=10MB
