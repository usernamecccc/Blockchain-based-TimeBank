# 本地无 MySQL 时使用：spring-boot.run.profiles=dev 或 --spring.profiles.active=dev
server.port=8080

# 使用文件库（./data/timecoin），重启后账号数据保留；删除 backend/timecoin-web/data 目录可清空库重来
spring.datasource.url=jdbc:h2:file:./data/timecoin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.max-file-size=10MB

# TimeCoin：在 TimeCoinSystem 中启动链并部署后，将 blockchain.enabled=true，必要时更新 contract-address（重启 hardhat node 后需重新部署并改地址）
# 默认合约地址与 TimeCoinSystem/constants.js、hardhat-deploy 在 localhost 上首个合约一致
blockchain.enabled=false
blockchain.rpc-url=http://127.0.0.1:8545/
blockchain.contract-address=0x5fbdb2315678afecb367f032d93f642f64180aa3
# Hardhat 本地账户 #0（仅开发，须与部署 TimeCoin 的账户一致）
blockchain.private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
